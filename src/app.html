<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    
    <!-- PWA Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MrGuy Detail" />
    <meta name="theme-color" content="#0EA5E9" />
    
    <!-- Icons -->
    <link rel="icon" href="%sveltekit.assets%/favicons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicons/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicons/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/favicons/apple-touch-icon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
    
    <title>Mr. Guy Mobile Detail</title>
    %sveltekit.head%

    <!-- GA4: deferred until first user interaction to save ~136KB on initial load -->
    <script>
      function loadGA4() {
        if (window.__ga4Loaded) return;
        window.__ga4Loaded = true;
        var id = 'G-JYLB2K2Q22';
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
        s.async = true;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', id, { send_page_view: true });
        window.gtag = gtag;
      }
      ['click','scroll','keydown','touchstart'].forEach(function(e) {
        document.addEventListener(e, loadGA4, { once: true, passive: true });
      });
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
