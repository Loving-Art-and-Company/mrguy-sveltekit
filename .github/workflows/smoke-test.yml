name: Smoke Test
on:
  schedule:
    - cron: '45 */6 * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://mrguydetail.com" || echo "000")
          echo "Homepage: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "308" ]; then
            echo "::error::Homepage returned HTTP $STATUS"
            exit 1
          fi

      - name: Check booking page
        run: |
          RESPONSE=$(curl -I -s --max-time 30 "https://mrguydetail.com/book" || true)
          STATUS=$(printf "%s" "$RESPONSE" | awk 'NR==1 {print $2}')
          LOCATION=$(printf "%s" "$RESPONSE" | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $2}' | tr -d '\r')
          echo "Booking: $STATUS"
          echo "Location: ${LOCATION:-<none>}"
          if [ "$STATUS" != "302" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "308" ]; then
            echo "::error::Booking page returned HTTP $STATUS"
            exit 1
          fi
          if [ "$LOCATION" != "/#services" ] && [ "$LOCATION" != "https://mrguydetail.com/#services" ]; then
            echo "::error::Booking redirect location was ${LOCATION:-<none>}"
            exit 1
          fi

      - name: Check API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://mrguydetail.com/api/health" || echo "000")
          echo "API: $STATUS"
          # API health endpoint may not exist yet — warn but don't fail
          if [ "$STATUS" != "200" ]; then
            echo "::warning::API health returned HTTP $STATUS"
          fi
