name: Domain Smoke Test

on:
  push:
    branches:
      - main
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  domain-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify canonical domain redirect
        run: npm run smoke:domains
